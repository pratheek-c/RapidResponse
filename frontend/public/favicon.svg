<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="32" fill="#0a0c10"/>

  <!-- Outer red ring -->
  <circle cx="32" cy="32" r="29" stroke="#ef4444" stroke-width="2.5" fill="none"/>

  <!-- Siren dome -->
  <ellipse cx="32" cy="22" rx="12" ry="8" fill="#ef4444"/>

  <!-- Siren body -->
  <rect x="20" y="28" width="24" height="6" rx="2" fill="#ef4444"/>

  <!-- Base bar -->
  <rect x="16" y="34" width="32" height="5" rx="2" fill="#dc2626"/>

  <!-- Light beams (left and right) -->
  <line x1="32" y1="14" x2="32" y2="8"  stroke="#fca5a5" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="14" x2="22" y2="9"  stroke="#fca5a5" stroke-width="2"   stroke-linecap="round"/>
  <line x1="32" y1="14" x2="42" y2="9"  stroke="#fca5a5" stroke-width="2"   stroke-linecap="round"/>

  <!-- 9-1-1 text -->
  <text x="32" y="55" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" font-weight="900"
        fill="#ef4444" text-anchor="middle" letter-spacing="1">911</text>
</svg>
